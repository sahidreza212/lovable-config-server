server:
  port: 9030
  servlet:
    context-path: /intelligence

spring:
  datasource:
    url: jdbc:postgresql://localhost:9010/lovable-intelligence-db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver



logging:
  level:
    com.sarm.distributed_lovable: DEBUG
    org.springframework.ai: DEBUG

---

spring:
  config:
    activate:
      on-profile: k8s
  datasource:
    url: jdbc:postgresql://pgvector.lovable-core.svc.cluster.local:5432/intelligence_db
    username: intelligence_user
    password: ${DB_PASSWORD}


    ai:
    openai:
      api-key: ${AI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.2  




 
          

      
