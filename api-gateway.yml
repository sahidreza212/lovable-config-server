server:
  port: 8081

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:

            # Account Service
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/v1/account/**
              filters:
                - StripPrefix=2

            # Workspace Service
            - id: workspace-service
              uri: lb://workspace-service
              predicates:
                - Path=/api/v1/workspace/**
              filters:
                - StripPrefix=2

            # Intelligence Service
            - id: intelligence-service
              uri: lb://intelligence-service
              predicates:
                - Path=/api/v1/intelligence/**
              filters:
                - StripPrefix=2
